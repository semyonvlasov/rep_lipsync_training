model:
  img_size: 96
  audio_encoder: mel
  mel_steps: 16
  base_channels: 32
  predict_alpha: false

audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 200
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

syncnet:
  model_type: mirror
  epochs: 0
  batch_size: 64
  lr: 1.0e-4
  T: 5
  official_checkpoint: ../../models/wav2lip/checkpoints/lipsync_expert.pth
  checkpoint: null

generator_mirror_gan:
  epochs: 200000000000000000
  batch_size: 16
  sampling_mode: uniform
  lr: 1.0e-4
  disc_lr: 1.0e-4
  betas: [0.5, 0.999]
  checkpoint_interval_steps: 3000
  save_sample_images: false
  sample_interval_steps: 0
  eval_interval_steps: 500
  eval_batches_count: 300
  eval_seed: 20260408  # fixed val sampling for scheduler stability
  train_log_interval_steps: 50  # plain-text train status line; keep searchable independently of tqdm carriage returns
  save_optimizer_state: true  # legacy knob; periodic recovery checkpoints are always fp16 without optimizer state
  save_last_healthy: true

  syncnet_wt_initial: 0.0
  syncnet_wt_target: 0.02
  syncnet_enable_threshold: 1.50  # mirror teacher is harsher; open sync ramp earlier
  disc_wt: 0.07
  disc_wt_initial: 0.001
  min_disc_wt: 0.001  # keep a small adversarial signal alive even after guard-triggered downshifts

  adaptive_loss_schedule: true
  l1_only_warmup_steps: 25000
  adaptive_weight_freeze_step: 54000
  adaptive_weight_freeze_sync_wt: 0.00475
  adaptive_weight_freeze_disc_wt: 0.01300
  sync_wt_min: 0.0005  # once sync gate ever opens, never let sync weight fall below this floor
  sync_wt_step_up: 0.00025
  sync_wt_step_down: 0.001
  disc_wt_step_up: 0.0005
  disc_wt_step_down: 0.001
  disc_up_fake_max: 0.8  # only raise disc_wt while fake stays below this value
  disc_hold_abs_gap: 0.5  # if abs(fake-real) exceeds this, forbid disc_wt growth and hold
  max_sync_wt: 0.02
  max_disc_wt: 0.07
  max_total_wt: 0.08
  sync_l1_guard_max_ratio: 1.15
  disc_l1_guard_max_ratio: 1.35
  disc_guard_max_gap: 0.15

  emergency_eval_enabled: true  # one-shot emergency eval between regular evals; regular cadence stays unchanged
  emergency_eval_step_turn_on: 5000  # do not arm train-loop tripwire before this global step
  emergency_window_batches: 40  # rolling train window for batch-level disc_fake/disc_real losses
  emergency_disc_update_off_fake_max: 0.3  # freeze D updates if fake gets too low
  emergency_disc_unfreeze_clean_streak: 10  # unfreeze only after this many consecutive clean rolling-window checks
  emergency_disc_down_fake_min: 0.9  # emergency disc_wt brake only in this high-fake regime
  emergency_disc_down_fake_minus_real_gap: 0.5
  emergency_disc_step_down: 0.01  # one-shot emergency disc-only brake

  healthy_fake_min: null
  healthy_fake_max: null
  healthy_real_min: null
  healthy_real_max: null
  healthy_max_fake_real_gap: 0.15
  val_num_workers: 4

benchmark:
  enabled: true
  audio: output/benchmark_samples/short_4s.mp3
  faces:
    - output/benchmark_samples/portrait_avatar.mp4
    - output/benchmark_samples/portrait_rama.mp4
  device: cuda
  detector_device: cuda
  batch_size: 16
  face_det_batch_size: 4

checkpoint_publish:
  enabled: true
  remote: "gdrive:"
  drive_root_folder_id: 1y1P-LI3YTPV65zpHXMSrNYsykN2-s5Pv
  remote_dir_prefix: checkpoints
  experiment_name: generator_mirror_gan_fresh_currentbest_adaptive_20260408

data:
  hdtf_root: data/hdtf/processed
  talkvid_root: data/talkvid/processed
  fps: 25
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  crop_size: 256
  cache_size: 16
  skip_bad_samples: true
  ffmpeg_bin: ffmpeg
  materialize_timeout: 600
  min_samples_per_speaker: 0
  materialize_frames_size: 96
  lazy_cache_root: null

training:
  device: cuda
  mixed_precision: false
  allow_tf32: true
  cudnn_benchmark: true
  float32_matmul_precision: high
  gradient_clip: 0.0
  save_every: 1
  sample_every: 1
  output_dir: output/generator_mirror_gan_fresh_currentbest_adaptive_20260408
