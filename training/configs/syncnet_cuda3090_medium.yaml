# Full processed-HDTV SyncNet train on all clean clips except a 10-video holdout.

model:
  img_size: 96
  audio_encoder: "mel"
  mel_steps: 16
  base_channels: 32
  predict_alpha: false

audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 200
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

syncnet:
  epochs: 12
  batch_size: 64
  lr: 1.0e-4
  T: 5

data:
  hdtf_root: "data/hdtf/processed"
  fps: 25
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  cache_size: 16
  skip_bad_samples: true

training:
  device: "cuda"
  mixed_precision: true
  allow_tf32: true
  cudnn_benchmark: true
  gradient_clip: 1.0
  save_every: 1
  output_dir: "output/training_cuda3090_syncnet_full_minus10_20260321"
