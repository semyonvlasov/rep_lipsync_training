# Local test config — MPS, small dataset, quick validation

model:
  img_size: 192
  audio_encoder: "mel"
  mel_steps: 16
  base_channels: 48
  predict_alpha: false

audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 200
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

syncnet:
  epochs: 0  # skip — using pretrained official SyncNet
  batch_size: 8
  lr: 1.0e-4
  T: 5

generator:
  epochs: 10
  batch_size: 1
  lr: 1.0e-4
  lr_scheduler: "cosine"
  loss:
    l1: 1.0
    perceptual: 0.0
    sync: 0.2
    sync_warmup_epochs: 0
    gan: 0.0
    temporal: 0.0
    alpha_reg: 0.0

data:
  hdtf_root: "data/hdtf/processed"
  fps: 25
  num_workers: 0  # MPS doesn't play well with multiprocessing
  crop_size: 256

training:
  device: "mps"
  mixed_precision: false  # no AMP on MPS
  gradient_clip: 1.0
  save_every: 5
  sample_every: 1
  output_dir: "output/training_local"
