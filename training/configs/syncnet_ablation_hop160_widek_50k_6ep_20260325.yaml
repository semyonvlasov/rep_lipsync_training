# SyncNet hop=160 with widened late temporal kernel to compensate audio RF.

model:
  img_size: 96
  audio_encoder: "mel"
  mel_steps: 20
  audio_temporal_kernels: [3, 3, 3, 3, 3, 3, 3, 5]
  base_channels: 32
  predict_alpha: false

audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 160
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

syncnet:
  epochs: 6
  batch_size: 64
  lr: 1.0e-4
  T: 5

data:
  hdtf_root: "data/hdtf/processed"
  talkvid_root: "data/talkvid/processed_medium"
  fps: 25
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  cache_size: 16
  skip_bad_samples: true
  lazy_cache_root: "data/_lazy_cache_syncnet_hop_ablation_50k_kernel_20260325"
  ffmpeg_bin: "ffmpeg"
  materialize_timeout: 600
  materialize_frames_size: 96
  min_samples_per_speaker: 0

training:
  device: "cuda"
  mixed_precision: true
  allow_tf32: true
  cudnn_benchmark: true
  gradient_clip: 1.0
  save_every: 1
  output_dir: "output/syncnet_hop160_widek_ablation_50k_6ep_20260325"
