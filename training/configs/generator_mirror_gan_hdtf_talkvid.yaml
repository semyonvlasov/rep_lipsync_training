model:
  img_size: 96
  audio_encoder: mel
  mel_steps: 16
  base_channels: 32
  predict_alpha: false

audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 200
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

syncnet:
  model_type: mirror
  epochs: 0
  batch_size: 64
  lr: 1.0e-4
  T: 5
  official_checkpoint: ../../models/wav2lip/checkpoints/lipsync_expert.pth
  checkpoint: null

generator_mirror_gan:
  epochs: 13
  batch_size: 32
  lr: 1.0e-4
  disc_lr: 1.0e-4
  betas: [0.5, 0.999]
  checkpoint_interval_steps: 3000
  eval_interval_steps: 3000
  eval_steps: 300
  save_optimizer_state: true
  syncnet_wt_initial: 0.0
  syncnet_wt_target: 0.03
  syncnet_enable_threshold: 0.75
  disc_wt: 0.07
  val_num_workers: 4

data:
  hdtf_root: data/hdtf/processed
  talkvid_root: data/talkvid/processed
  fps: 25
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  crop_size: 256
  cache_size: 16
  skip_bad_samples: true
  ffmpeg_bin: ffmpeg
  materialize_timeout: 600
  min_samples_per_speaker: 0
  materialize_frames_size: 96
  lazy_cache_root: null
  sync_alignment:
    enabled: true
    compute_if_missing: true
    guard_mel_ticks: 10
    search_mel_ticks: 10
    samples: 0
    sample_density_per_5s: 10.0
    seed: 20260403
    min_start_gap_ratio: 0.0
    start_gap_multiple: 0
    device: auto
    batch_size: 640
    outlier_trim_ratio: 0.2
    syncnet_checkpoint: null
    write_manifest: true

training:
  device: cuda
  mixed_precision: false
  allow_tf32: true
  cudnn_benchmark: true
  float32_matmul_precision: high
  gradient_clip: 0.0
  save_every: 1
  sample_every: 1
  output_dir: output/generator_mirror_gan_hdtf_talkvid
