model:
  img_size: 96
  audio_encoder: mel
  mel_steps: 16
  base_channels: 32
  predict_alpha: false

audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 200
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

syncnet:
  epochs: 0
  batch_size: 64
  lr: 0.0001
  T: 5

generator:
  epochs: 13
  batch_size: 32
  lr: 0.0001
  lr_scheduler: none
  betas: [0.9, 0.999]
  gan_betas: [0.5, 0.999]
  eval_interval_steps: 3000
  eval_batches: 700
  loss:
    l1: 1.0
    perceptual: 0.0
    sync: 0.01
    sync_initial: 0.01
    sync_warmup_epochs: 0
    sync_official_schedule: false
    sync_official_threshold: 0.75
    sync_adaptive_schedule: false
    sync_adaptive_start: 4.5
    sync_adaptive_full: 2.6
    sync_eval_monitor_only: true
    gan_mode: official_hq
    gan: 0.0
    temporal: 0.0
    alpha_reg: 0.0

data:
  hdtf_root: data/hdtf/processed
  talkvid_root: data/talkvid/processed
  fps: 25
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  crop_size: 256
  cache_size: 16
  skip_bad_samples: true
  ffmpeg_bin: ffmpeg
  materialize_timeout: 600
  min_samples_per_speaker: 0
  materialize_frames_size: 96
  lazy_cache_root: data/_lazy_cache_generator_medium_x96_b64_lazy_full_20260325

training:
  device: cuda
  mixed_precision: true
  allow_tf32: true
  cudnn_benchmark: true
  float32_matmul_precision: high
  gradient_clip: 1.0
  save_every: 1
  latest_save_interval_steps: 3000
  sample_every: 1
  output_dir: output/generator_medium_x96_b32_official_syncnet_continue_from_ablation_winner_20260328
