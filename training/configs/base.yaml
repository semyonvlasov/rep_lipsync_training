# LipSync training configuration

# --- Model ---
model:
  img_size: 192            # Output face resolution (96, 128, 192, 256)
  audio_encoder: "mel"     # mel spectrogram input
  mel_steps: 16            # mel frames per video frame (same as the reference setup)
  base_channels: 32        # base channel width (scale up for larger resolution)
  predict_alpha: false     # disable until blending is wired into the training target

# --- Audio ---
audio:
  sample_rate: 16000
  n_fft: 800
  hop_size: 200
  win_size: 800
  n_mels: 80
  fmin: 55
  fmax: 7600
  preemphasis: 0.97

# --- SyncNet ---
syncnet:
  epochs: 50
  batch_size: 64
  lr: 1.0e-4
  T: 5                    # temporal window (video frames)
  checkpoint: null         # resume from

# --- Generator ---
generator:
  epochs: 200
  batch_size: 4
  lr: 1.0e-4
  lr_scheduler: "none"
  betas: [0.9, 0.999]
  gan_betas: [0.5, 0.999] # official HQ Wav2Lip GAN recipe
  eval_interval_steps: 3000
  eval_batches: 700

  # Loss weights
  loss:
    l1: 1.0                # full-face reconstruction (reference Wav2Lip path)
    perceptual: 0.0        # keep off until the model proves it uses audio
    sync: 0.01             # reference target weight once sync is enabled
    sync_initial: 0.0      # start like official Wav2Lip and enable later
    sync_warmup_epochs: 0
    sync_official_schedule: false
    sync_official_threshold: 0.75
    sync_adaptive_schedule: true
    sync_adaptive_start: 8.0
    sync_adaptive_full: 4.5
    gan_mode: "official_hq" # switch to "patch" only for legacy ablations
    gan: 0.0               # keep off during audio-sanity phase
    temporal: 0.0          # handled implicitly by the T=5 generator window
    alpha_reg: 0.0         # alpha head disabled for now

# --- Data ---
data:
  # Paths to datasets (configure before training)
  voxceleb2_root: null     # /path/to/VoxCeleb2/mp4
  lrs2_root: null          # /path/to/LRS2/main
  hdtf_root: null          # /path/to/HDTF
  talkvid_root: null       # /path/to/TalkVid processed speakers

  fps: 25                  # dataset loader normalizes videos to this fps
  num_workers: 8
  crop_size: 256           # face crop from video before resize to img_size
  lazy_cache_root: null    # optional cache root for canonical faceclip mp4+json datasets
  ffmpeg_bin: "ffmpeg"     # used for lazy mel extraction from faceclip mp4
  materialize_timeout: 600 # seconds to wait for another worker's cache build lock
  materialize_frames_size: null # optional override; defaults to model.img_size in train/check scripts

# --- Training ---
training:
  device: "cuda"           # cuda, mps, cpu
  mixed_precision: true
  gradient_clip: 0.0
  save_every: 5            # save checkpoint every N epochs
  sample_every: 1          # generate sample images every N epochs
  output_dir: "output/training"
