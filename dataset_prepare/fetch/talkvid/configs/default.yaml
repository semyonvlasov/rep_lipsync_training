stage: fetch_talkvid_raw_to_gdrive

runtime:
  python_bin: python3

gdrive:
  remote: "gdrive:"
  raw:
    url: "https://drive.google.com/drive/folders/1v06momk8fR-eqw79Z93zczBx_InWsCS9?usp=drive_link"
    folder_id: "1v06momk8fR-eqw79Z93zczBx_InWsCS9"

paths:
  processing_folder: training/data/talkvid_local
  raw_archives_folder: training/data/talkvid_local/archives
  log_folder: training/output/talkvid_local_cycle

cookies:
  file: /tmp/talkvid_local_cookies.txt
  from_browser: ""

fetch:
  variant: with_captions
  target_size_gb: 1.0
  download_jobs: 4
  request_min_interval_seconds: 1.0
  rate_limit_cooldown_seconds: 600
  max_rate_limit_cooldowns: 2
  download_max_height: 720
  download_min_duration: 4.0
  download_max_duration: 6.5
  download_min_width: 720
  download_min_height: 720
  download_min_dover: 8.0
  download_min_cotracker: 0.9
  min_free_gb: 5.0
  download_timeout: 300
