stage: fetch_talkvid_raw_to_gdrive

runtime:
  python_bin: python3

gdrive:
  remote: "gdrive:"
  raw:
    url: "https://drive.google.com/drive/folders/1v06momk8fR-eqw79Z93zczBx_InWsCS9?usp=drive_link"
    folder_id: "1v06momk8fR-eqw79Z93zczBx_InWsCS9"

paths:
  workspace_root: data/dataset_prepare/fetch/talkvid
  log_folder: data/dataset_prepare/fetch/talkvid/logs

cookies:
  file: /tmp/talkvid_local_cookies.txt
  from_browser: chrome
  rotate_every_successes: 500

fetch:
  # Which official TalkVid metadata manifest to use:
  # - with_captions -> filtered_video_clips_with_captions.json
  # - raw_filtered  -> filtered_video_clips.json
  variant: with_captions
  target_size_gb: 1.0
  download_jobs: 1
  request_min_interval_seconds: 1.0
  rate_limit_cooldown_seconds: 600
  max_rate_limit_cooldowns: 2
  download_max_height: 1080
  download_min_duration: 4.0
  download_max_duration: 6.5
  download_min_width: 720
  download_min_height: 720
  # Minimum TalkVid metadata dover_scores value required to keep a clip.
  download_min_dover: 8.0
  # Minimum TalkVid metadata cotracker_ratio value required to keep a clip.
  download_min_cotracker: 0.9
  min_free_gb: 5.0
  # Per-clip yt-dlp subprocess timeout in seconds.
  download_timeout: 60
