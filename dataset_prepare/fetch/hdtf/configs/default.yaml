stage: fetch_hdtf_public_to_gdrive

runtime:
  python_bin: python3

gdrive:
  remote: "gdrive:"
  raw:
    url: "https://drive.google.com/drive/folders/1v06momk8fR-eqw79Z93zczBx_InWsCS9?usp=drive_link"
    folder_id: "1v06momk8fR-eqw79Z93zczBx_InWsCS9"

paths:
  workspace_root: data/dataset_prepare/fetch/hdtf
  log_folder: data/dataset_prepare/fetch/hdtf/logs

fetch:
  # Max raw videos to download from the HDTF annotation lists (0 = no explicit count limit).
  max_videos: 0
  # Stop downloading once raw/ reaches this size in GB (0 = disabled).
  target_size_gb: 0
  # yt-dlp picks the best available stream with height <= this value.
  download_max_height: 720
  # Per-video yt-dlp subprocess timeout in seconds.
  download_timeout: 120
  # Max archive size when packing raw mp4 files into upload batches.
  batch_size_gb: 1.0
  # Max raw tar batches to create in one packaging run (0 = no explicit limit).
  max_batches: 0
