# Shared process defaults used by source-specific service launchers.

runtime:
  python_bin: python3
  ffmpeg_bin: ""
  ffmpeg_threads: 4
  ffmpeg_timeout: 180
  video_encoder: auto

gdrive:
  remote: "gdrive:"
  raw:
    url: "https://drive.google.com/drive/folders/1v06momk8fR-eqw79Z93zczBx_InWsCS9?usp=drive_link"
    folder_id: "1v06momk8fR-eqw79Z93zczBx_InWsCS9"
  processed:
    url: "https://drive.google.com/drive/folders/1xx2IlfiAYC1AFf3xJwcjeTEsAK-Uqt8n?usp=drive_link"
    folder_id: "1xx2IlfiAYC1AFf3xJwcjeTEsAK-Uqt8n"

source:
  batch_glob: "batch_*"
  complete_flag_name: "fetch_complete.json"

process:
  faceclip_size: 288
  processed_fps: 25
  max_frames: 250
  detect_every: 1
  smooth_window: 5
  smoothing_style: official_inference
  framing_style: official_inference
  detector_backend: sfd
  detector_device: auto
  detector_batch_size: 4
  min_detector_score: 0.99999
  resize_device: auto
  normalized_video_bitrate: 15m
  processed_video_bitrate: 600k
